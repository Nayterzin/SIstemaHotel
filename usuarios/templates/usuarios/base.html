<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hotel Serra Nobre{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1d4ed8; /* Blue 700 - Destaque */
            --primary-hover: #1e40af; /* Blue 800 */
            --accent: #3b82f6; /* Blue 500 */
            --secondary: #64748b;
            --background: #020617; /* Slate 950 - Fundo Marinho Profundo */
            --surface: #0f172a; /* Slate 900 - Superfície */
            --text-main: #f8fafc; /* Slate 50 - Texto Claro */
            --text-muted: #94a3b8; /* Slate 400 */
            --border: #1e293b; /* Slate 800 */
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        header {
            background-color: var(--surface);
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">🏨 Hotel Serra Nobre</a>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="margin-top: auto; padding: 2rem 0; text-align: center; color: var(--text-muted); font-size: 0.875rem;">
        &copy; 2026 Hotel Serra Nobre. Todos os direitos reservados.
    </footer>
</body>
</html>
